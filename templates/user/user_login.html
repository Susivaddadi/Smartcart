<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Login - SmartCart</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#ff4b7d,#ff6b9a,#1b2640);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

/* LOGIN CARD */
.container{
    width:100%;
    max-width:460px;
    background:#fff;
    padding:25px 25px;
    border-radius:22px;
    box-shadow:0 18px 40px rgba(0,0,0,0.22);
}

/* TOP LINKS INSIDE CARD */
.top-links{
    display:flex;
    justify-content:flex-end;
    gap:10px;
    margin-bottom:15px;
}

.top-links a{
    text-decoration:none;
    background:#fff;
    color:#ff3f6c;
    padding:8px 14px;
    border-radius:10px;
    font-weight:800;
    font-size:13px;
    border:1px solid #ff3f6c;
    transition:0.3s;
}

.top-links a:hover{
    background:#111827;
    color:#fff;
    border-color:#111827;
}

/* LOGO */
.logo{
    text-align:center;
    margin-bottom:20px;
}

.logo-row{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:12px;
    flex-wrap:wrap;
}

.logo-icon{
    width:60px;
    height:60px;
    border-radius:50%;
    background:linear-gradient(135deg,#ff3f6c,#ff6b9a);
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:28px;
}

.logo h1{
    font-size:34px;
    font-weight:900;
    color:#111827;
}

.logo h1 span{
    color:#ff3f6c;
}

.logo p{
    margin-top:8px;
    color:#6b7280;
}

/* TEXT */
.heading{
    text-align:center;
    margin-bottom:18px;
}

.heading h2{
    font-size:26px;
    margin-bottom:6px;
}

.heading p{
    color:#6b7280;
}

/* FORM */
.form-group{
    margin-bottom:16px;
}

label{
    display:block;
    margin-bottom:6px;
    font-weight:800;
    color:#374151;
}

input{
    width:100%;
    padding:13px;
    border:2px solid #d1d5db;
    border-radius:12px;
    font-size:15px;
    transition:0.3s;
}

input:focus{
    outline:none;
    border-color:#ff3f6c;
}

/* BUTTON */
button{
    width:100%;
    border:none;
    padding:14px;
    border-radius:12px;
    background:#111827;
    color:#fff;
    font-size:16px;
    font-weight:800;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#ff3f6c;
}

/* LINKS */
.extra-links{
    margin-top:18px;
    text-align:center;
}

.extra-links p{
    margin-bottom:8px;
    color:#6b7280;
}

.extra-links a{
    color:#ff3f6c;
    text-decoration:none;
    font-weight:800;
}

/* ================= RESPONSIVE ================= */

@media(max-width:768px){
    .container{
        max-width:420px;
        padding:22px;
    }

    .logo h1{
        font-size:30px;
    }

    .heading h2{
        font-size:24px;
    }
}

@media(max-width:480px){

    body{
        padding:10px;
    }

    .container{
        width:100%;
        border-radius:16px;
        padding:20px;
    }

    .top-links{
        justify-content:center;
        flex-wrap:wrap;
    }

    .logo h1{
        font-size:26px;
    }

    .heading h2{
        font-size:22px;
    }

    input{
        font-size:14px;
    }
}
</style>
</head>

<body>

<div class="container">

    <!-- TOP LINKS INSIDE CARD -->
    <div class="top-links">
        <a href="/about">About</a>
        <a href="/contact">Contact</a>
    </div>

    <div class="logo">
        <div class="logo-row">
            <div class="logo-icon">🛍️</div>
            <h1>Smart<span>Cart</span></h1>
        </div>
        <p>Your Smart Shopping Partner</p>
    </div>

    <div class="heading">
        <h2>User Login</h2>
        <p>Login to shop with SmartCart</p>
    </div>

    <form method="POST">

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" placeholder="Enter your email" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter your password" required>
        </div>

        <button type="submit">Login</button>

    </form>

    <div class="extra-links">
        <p>Do not have account? <a href="/user-register">Register</a></p>
        <a href="/user/forgot-password">Forgot Password?</a>
    </div>

</div>

</body>
</html>
