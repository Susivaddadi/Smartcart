<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password - SmartCart</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#ff4b7d,#ff6b9a,#1b2640);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

/* CARD */
.container{
    width:100%;
    max-width:460px;
    background:#fff;
    padding:25px;
    border-radius:22px;
    box-shadow:0 18px 40px rgba(0,0,0,0.22);
}

/* LOGO */
.logo{
    text-align:center;
    margin-bottom:20px;
}

.logo-row{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:12px;
    flex-wrap:wrap;
}

.logo-icon{
    width:60px;
    height:60px;
    border-radius:50%;
    background:linear-gradient(135deg,#ff3f6c,#ff6b9a);
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:28px;
}

.logo h1{
    font-size:34px;
    font-weight:900;
    color:#111827;
}

.logo h1 span{
    color:#ff3f6c;
}

.logo p{
    margin-top:8px;
    color:#6b7280;
}

/* HEADING */
.heading{
    text-align:center;
    margin-bottom:18px;
}

.heading h2{
    font-size:26px;
    margin-bottom:6px;
    color:#111827;
}

.heading p{
    color:#6b7280;
}

/* FLASH */
.flash-msg{
    margin-bottom:16px;
}

.flash-msg p{
    background:#fff1f5;
    color:#be123c;
    border:1px solid #ffb3c7;
    padding:12px;
    border-radius:12px;
    font-weight:700;
    text-align:center;
    margin-bottom:10px;
}

/* FORM */
.form-group{
    margin-bottom:16px;
}

label{
    display:block;
    margin-bottom:6px;
    font-weight:800;
    color:#374151;
}

input{
    width:100%;
    padding:13px;
    border:2px solid #d1d5db;
    border-radius:12px;
    font-size:15px;
    transition:0.3s;
}

input:focus{
    outline:none;
    border-color:#ff3f6c;
}

/* BUTTON */
button{
    width:100%;
    border:none;
    padding:14px;
    border-radius:12px;
    background:#111827;
    color:#fff;
    font-size:16px;
    font-weight:800;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#ff3f6c;
}

/* LINKS */
.extra-links{
    margin-top:18px;
    text-align:center;
}

.extra-links a{
    color:#ff3f6c;
    text-decoration:none;
    font-weight:800;
}

/* RESPONSIVE */
@media(max-width:768px){
    .container{
        max-width:420px;
        padding:22px;
    }

    .logo h1{
        font-size:30px;
    }

    .heading h2{
        font-size:24px;
    }
}

@media(max-width:480px){
    body{
        padding:10px;
    }

    .container{
        width:100%;
        border-radius:16px;
        padding:20px;
    }

    .logo h1{
        font-size:26px;
    }

    .heading h2{
        font-size:22px;
    }

    input{
        font-size:14px;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="logo">
        <div class="logo-row">
            <div class="logo-icon">🛍️</div>
            <h1>Smart<span>Cart</span></h1>
        </div>
        <p>Your Smart Shopping Partner</p>
    </div>

    <div class="heading">
        <h2>Reset Password</h2>
        <p>Create a new password</p>
    </div>

    <div class="flash-msg">
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, msg in messages %}
                <p>{{ msg }}</p>
            {% endfor %}
        {% endif %}
        {% endwith %}
    </div>

    <form method="POST">

        <div class="form-group">
            <label>New Password</label>
            <input type="password" name="password" placeholder="Enter new password" required>
        </div>

        <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" name="confirm_password" placeholder="Confirm password" required>
        </div>

        <button type="submit">Reset Password</button>

    </form>

    <div class="extra-links">
        <a href="{{ url_for('admin_login') }}">Back to Login</a>
    </div>

</div>

</body>
</html>
