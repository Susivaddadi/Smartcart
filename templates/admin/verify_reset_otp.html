<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password OTP - SmartCart</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#1e3a8a,#2563eb);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

/* Main Box */
.container{
    width:100%;
    max-width:460px;
    background:#ffffff;
    padding:35px 30px;
    border-radius:22px;
    box-shadow:0 18px 40px rgba(0,0,0,0.22);
}

/* Logo */
.logo{
    text-align:center;
    margin-bottom:28px;
}

.logo-row{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:12px;
    flex-wrap:wrap;
}

.logo-icon{
    width:65px;
    height:65px;
    border-radius:50%;
    background:linear-gradient(135deg,#2563eb,#1d4ed8);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:30px;
    color:#fff;
    box-shadow:0 10px 20px rgba(37,99,235,0.28);
}

.logo h1{
    font-size:38px;
    font-weight:800;
    color:#111827;
}

.logo h1 span{
    color:#f97316;
}

.logo p{
    margin-top:10px;
    color:#6b7280;
    font-size:16px;
}

/* Heading */
.heading{
    text-align:center;
    margin-bottom:25px;
}

.heading h2{
    font-size:30px;
    color:#111827;
    margin-bottom:8px;
}

.heading p{
    color:#6b7280;
    font-size:16px;
    line-height:1.5;
}

/* Flash */
.flash-msg{
    margin-bottom:18px;
}

.flash-msg p{
    background:#fff7ed;
    color:#9a3412;
    border:1px solid #fdba74;
    padding:14px;
    border-radius:12px;
    font-weight:600;
    margin-bottom:10px;
    font-size:15px;
}

/* Form */
.form-group{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:8px;
    font-size:15px;
    font-weight:700;
    color:#374151;
}

input{
    width:100%;
    padding:15px;
    border:2px solid #d1d5db;
    border-radius:13px;
    font-size:16px;
    outline:none;
    transition:0.3s;
}

input:focus{
    border-color:#2563eb;
    box-shadow:0 0 0 3px rgba(37,99,235,0.15);
}

button{
    width:100%;
    padding:16px;
    background:#2563eb;
    color:#fff;
    border:none;
    border-radius:14px;
    font-size:18px;
    font-weight:700;
    cursor:pointer;
    transition:0.3s;
    margin-top:8px;
}

button:hover{
    background:#1d4ed8;
}

/* Laptop */
@media (max-width:992px){
    .container{
        max-width:430px;
        padding:32px 26px;
    }

    .logo h1{
        font-size:34px;
    }

    .heading h2{
        font-size:28px;
    }
}

/* Tablet */
@media (max-width:768px){
    body{
        padding:15px;
    }

    .container{
        max-width:100%;
        padding:28px 24px;
    }

    .logo-icon{
        width:58px;
        height:58px;
        font-size:26px;
    }

    .logo h1{
        font-size:30px;
    }

    .heading h2{
        font-size:26px;
    }

    .heading p{
        font-size:15px;
    }

    input{
        padding:14px;
        font-size:15px;
    }

    button{
        padding:15px;
        font-size:16px;
    }
}

/* Mobile */
@media (max-width:480px){
    body{
        padding:0;
        align-items:flex-start;
    }

    .container{
        min-height:100vh;
        border-radius:0;
        padding:30px 20px;
        display:flex;
        flex-direction:column;
        justify-content:center;
    }

    .logo-row{
        gap:10px;
    }

    .logo-icon{
        width:52px;
        height:52px;
        font-size:23px;
    }

    .logo h1{
        font-size:27px;
    }

    .logo p{
        font-size:14px;
    }

    .heading h2{
        font-size:23px;
    }

    .heading p{
        font-size:14px;
    }

    label{
        font-size:14px;
    }

    input{
        padding:13px;
        font-size:14px;
    }

    button{
        padding:14px;
        font-size:15px;
    }

    .flash-msg p{
        font-size:14px;
        padding:12px;
    }
}

/* Extra Small Devices */
@media (max-width:360px){
    .container{
        padding:25px 16px;
    }

    .logo h1{
        font-size:24px;
    }

    .heading h2{
        font-size:20px;
    }

    button{
        font-size:14px;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="logo">
        <div class="logo-row">
            <div class="logo-icon">🛍️</div>
            <h1>Smart<span>Cart</span></h1>
        </div>
        <p>Your Smart Shopping Partner</p>
    </div>

    <div class="heading">
        <h2>Enter OTP & New Password</h2>
        <p>Verify your OTP and set a new secure password.</p>
    </div>

    <div class="flash-msg">
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, msg in messages %}
                <p>{{ msg }}</p>
            {% endfor %}
        {% endif %}
        {% endwith %}
    </div>

    <form method="POST">

        <div class="form-group">
            <label>OTP</label>
            <input type="text" name="otp" placeholder="Enter OTP" required>
        </div>

        <div class="form-group">
            <label>New Password</label>
            <input type="password" name="password" placeholder="Enter new password" required>
        </div>

        <button type="submit">Update Password</button>

    </form>

</div>

</body>
</html>
