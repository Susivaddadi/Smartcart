<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Details - SmartCart</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    min-height:100vh;
    background:#f5f7fb;
    display:flex;
    flex-direction:column;
}

/* NAVBAR */
.navbar{
    width:100%;
    background:linear-gradient(135deg,#1e3a8a,#2563eb);
    padding:14px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    position:relative;
}

.logo{
    display:flex;
    align-items:center;
    gap:10px;
    color:#fff;
}

.logo-icon{
    width:40px;
    height:40px;
    border-radius:50%;
    background:rgba(255,255,255,0.2);
    display:flex;
    align-items:center;
    justify-content:center;
}

.logo h1{
    font-size:24px;
    font-weight:800;
}

.logo h1 span{
    color:#f97316;
}

/* MENU LINKS */
.nav-links{
    display:flex;
    gap:12px;
}

.nav-links a{
    text-decoration:none;
    color:#fff;
    padding:10px 14px;
    border-radius:8px;
    background:rgba(255,255,255,0.12);
    font-weight:700;
    transition:0.3s;
}

.nav-links a:hover{
    background:#fff;
    color:#2563eb;
}

/* HAMBURGER */
.menu-toggle{
    display:none;
    flex-direction:column;
    cursor:pointer;
    gap:5px;
}

.menu-toggle span{
    width:28px;
    height:3px;
    background:#fff;
    border-radius:5px;
}

/* CONTAINER */
.container{
    max-width:1100px;
    margin:40px auto;
    padding:0 20px;
    flex:1;
}

.card{
    background:#fff;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

/* PRODUCT */
.product-box{
    display:grid;
    grid-template-columns:420px 1fr;
    gap:30px;
    margin-top:20px;
}

.product-image{
    width:100%;
    height:420px;
    object-fit:cover;
    border-radius:18px;
}

.details h3{
    font-size:28px;
    margin-bottom:15px;
}

.info{
    background:#f9fafb;
    padding:12px;
    margin-bottom:12px;
    border-radius:12px;
}

.price{
    font-size:30px;
    color:green;
    font-weight:800;
    margin:15px 0;
}

/* BUTTONS */
.actions{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.actions a{
    text-decoration:none;
    padding:12px 15px;
    border-radius:10px;
    font-weight:700;
}

.btn1{background:#2563eb;color:#fff;}
.btn2{background:#e0e7ff;color:#1d4ed8;}

/* FOOTER */
.footer{
    text-align:center;
    padding:15px;
    background:#fff;
    border-top:1px solid #e5e7eb;
}

/* RESPONSIVE */
@media(max-width:900px){
    .product-box{
        grid-template-columns:1fr;
    }

    .product-image{
        height:300px;
    }
}

/* MOBILE */
@media(max-width:768px){

    .menu-toggle{
        display:flex;
    }

    .nav-links{
        position:absolute;
        top:60px;
        right:0;
        background:#1e3a8a;
        width:100%;
        flex-direction:column;
        display:none;
        padding:15px;
    }

    .nav-links.active{
        display:flex;
    }

    .nav-links a{
        width:100%;
        text-align:center;
    }
}

@media(max-width:480px){
    .card{
        padding:18px;
    }

    .product-image{
        height:240px;
    }

    .details h3{
        font-size:22px;
    }

    .price{
        font-size:24px;
    }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">

    <div class="logo">
        <div class="logo-icon">🛍️</div>
        <h1>Smart<span>Cart</span></h1>
    </div>

    <!-- MENU -->
    <div class="menu-toggle" onclick="toggleMenu()">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <div class="nav-links" id="menu">
        <a href="/admin-dashboard">Dashboard</a>
        <a href="/admin/add-item">Add Product</a>
        <a href="/admin/item-list">Products</a>
        <a href="/admin/profile">Profile</a>
        <a href="/admin-logout">Logout</a>
    </div>

</div>

<!-- CONTENT -->
<div class="container">
    <div class="card">

        <div class="product-box">

            <img src="/static/uploads/product_images/{{ product.image }}" class="product-image">

            <div class="details">
                <h3>{{ product.name }}</h3>

                <div class="info">{{ product.description }}</div>
                <div class="info">{{ product.category }}</div>

                <div class="price">₹{{ product.price }}</div>

                <div class="actions">
                    <a class="btn1" href="/admin/item-list">All Products</a>
                    <a class="btn2" href="/admin-dashboard">Dashboard</a>
                </div>
            </div>

        </div>

    </div>
</div>

<!-- FOOTER -->
<div class="footer">
    © 2026 SmartCart Admin Panel
</div>

<script>
function toggleMenu(){
    document.getElementById("menu").classList.toggle("active");
}
</script>

</body>
</html>
