<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify OTP - SmartCart</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#1e3a8a,#2563eb);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:460px;
    background:#ffffff;
    padding:35px 30px;
    border-radius:22px;
    box-shadow:0 18px 40px rgba(0,0,0,0.22);
}

.logo{
    text-align:center;
    margin-bottom:28px;
}

.logo-row{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:12px;
    flex-wrap:wrap;
}

.logo-icon{
    width:65px;
    height:65px;
    border-radius:50%;
    background:linear-gradient(135deg,#2563eb,#1d4ed8);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:30px;
    color:#fff;
    box-shadow:0 10px 20px rgba(37,99,235,0.28);
}

.logo h1{
    font-size:38px;
    font-weight:800;
    color:#111827;
}

.logo h1 span{
    color:#f97316;
}

.logo p{
    margin-top:10px;
    color:#6b7280;
    font-size:16px;
}

.heading{
    text-align:center;
    margin-bottom:25px;
}

.heading h2{
    font-size:30px;
    color:#111827;
    margin-bottom:8px;
}

.heading p{
    color:#6b7280;
    font-size:16px;
    line-height:1.5;
}

.flash-msg{
    margin-bottom:18px;
}

.flash-msg p{
    background:#fff1f2;
    color:#991b1b;
    border:1px solid #fecdd3;
    padding:14px;
    border-radius:12px;
    font-weight:600;
    margin-bottom:10px;
}

.form-group{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:8px;
    font-size:15px;
    font-weight:700;
    color:#374151;
}

input{
    width:100%;
    padding:15px;
    border:2px solid #d1d5db;
    border-radius:13px;
    font-size:16px;
    outline:none;
    transition:0.3s;
}

input:focus{
    border-color:#2563eb;
    box-shadow:0 0 0 3px rgba(37,99,235,0.15);
}

button{
    width:100%;
    padding:16px;
    background:#2563eb;
    color:#fff;
    border:none;
    border-radius:14px;
    font-size:18px;
    font-weight:700;
    cursor:pointer;
    transition:0.3s;
    margin-top:8px;
}

button:hover{
    background:#1d4ed8;
}

/* Tablet */
@media(max-width:768px){
    body{
        padding:18px;
    }

    .container{
        max-width:430px;
        padding:32px 24px;
    }

    .logo h1{
        font-size:34px;
    }

    .heading h2{
        font-size:28px;
    }
}

/* Mobile */
@media(max-width:480px){
    body{
        padding:0;
        align-items:flex-start;
    }

    .container{
        width:100%;
        min-height:100vh;
        border-radius:0;
        padding:32px 20px;
        box-shadow:none;
        display:flex;
        flex-direction:column;
        justify-content:center;
    }

    .logo{
        margin-bottom:22px;
    }

    .logo h1{
        font-size:30px;
    }

    .logo p,
    .heading p{
        font-size:14px;
    }

    .heading h2{
        font-size:25px;
    }

    .logo-icon{
        width:52px;
        height:52px;
        font-size:23px;
    }

    input,
    button{
        font-size:15px;
        padding:13px;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="logo">
        <div class="logo-row">
            <div class="logo-icon">🛍️</div>
            <h1>Smart<span>Cart</span></h1>
        </div>
        <p>Your Smart Shopping Partner</p>
    </div>

    <div class="heading">
        <h2>Verify OTP</h2>
        <p>Enter the OTP sent to your email and create your password.</p>
    </div>

    <div class="flash-msg">
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% for category, message in messages %}
            <p>{{ message }}</p>
          {% endfor %}
        {% endwith %}
    </div>

    <form method="POST" action="/verify-otp">

        <div class="form-group">
            <label>Enter OTP</label>
            <input type="text" name="otp" placeholder="Enter OTP" required>
        </div>

        <div class="form-group">
            <label>Create Password</label>
            <input type="password" name="password" placeholder="Create password" required>
        </div>

        <button type="submit">Verify & Register</button>

    </form>

</div>

</body>
</html>
